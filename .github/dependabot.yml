version: 2
updates:
  # Keep the pinned action versions current (checkout, create-github-app-token,
  # setup-terraform).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"

  # Keep the integrations/github provider constraint + lockfile current.
  - package-ecosystem: terraform
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
