name: terraform

on:
  workflow_dispatch: {}
  pull_request:
    paths: ["**.tf", "**.tfvars", ".github/workflows/terraform.yml"]
  push:
    branches: [main]
    paths: ["**.tf", "**.tfvars"]

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GitHub App token (preferred over a long-lived PAT). The App must be
      # installed on the org with Organization administration: read & write.
      - name: Generate org admin token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TF_APP_ID }}
          private-key: ${{ secrets.TF_APP_PRIVATE_KEY }}
          owner: chloros-nl

      # Expose it to every later step as the Terraform provider's credential.
      - name: Export token for Terraform
        run: echo "GITHUB_TOKEN=${{ steps.app-token.outputs.token }}" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      - run: terraform init
      - run: terraform fmt -check -recursive
      - run: terraform validate

      - name: Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -input=false

      - name: Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
