name: terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: "plan or apply"
        type: choice
        options: [plan, apply]
        default: plan
  pull_request:
    paths: ["**.tf", "**.tfvars", ".github/workflows/terraform.yml"]
  push:
    branches: [main]
    paths: ["**.tf", "**.tfvars"]

permissions:
  contents: write # needed to commit updated state back to the repo
  pull-requests: write

# State lives in the repo and has no lock. Serialize runs so two applies can
# never write state concurrently. Never cancel a run mid-apply.
concurrency:
  group: terraform-state
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # GitHub App token for the Terraform provider (Organization
      # administration + members). Scoped to the plan/apply steps only via
      # step-level env — it is NOT exported job-wide, so the commit/push step
      # never sees it (that step pushes with the default Actions token that
      # actions/checkout persists).
      - name: Generate org admin token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.TF_APP_ID }}
          private-key: ${{ secrets.TF_APP_PRIVATE_KEY }}
          owner: chloros-nl

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.6

      - run: terraform init
      - run: terraform fmt -check -recursive
      - run: terraform validate

      - name: Plan
        if: >-
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'plan')
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: terraform plan -no-color -input=false

      # Apply only ever runs from main: on push to main, or a dispatch that was
      # explicitly launched from main (the ref guard stops applying a feature
      # branch's config to the live org).
      - name: Apply
        id: apply
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && github.ref == 'refs/heads/main')
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: terraform apply -auto-approve -input=false

      - name: Commit state back to repo
        if: steps.apply.outcome == 'success'
        run: |
          if git diff --quiet -- terraform.tfstate; then
            echo "State unchanged — nothing to commit."
            exit 0
          fi
          # Tripwire: never commit state once it begins storing secret values.
          # (The committed-state design depends on state being secret-free.)
          if [ "$(jq '[.resources[].instances[].sensitive_attributes // [] | length] | add // 0' terraform.tfstate)" != "0" ]; then
            echo "::error::terraform.tfstate now contains sensitive attributes — refusing to commit. Switch to the encrypted remote backend (see versions.tf)."
            exit 1
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add terraform.tfstate
          git commit -m "chore(ci): update terraform state [skip ci]"
          # main may have advanced during apply — the concurrency group only
          # serializes the two terraform workflows, not other pushes to main.
          # Rebase the state-only commit and retry so it is never lost.
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              exit 0
            fi
            echo "push attempt $attempt failed (likely non-fast-forward); rebasing and retrying..."
            sleep $((RANDOM % 4 + 2))
          done
          echo "::error::could not push updated state after 3 attempts — apply succeeded but state is uncommitted; reconcile manually"
          exit 1
