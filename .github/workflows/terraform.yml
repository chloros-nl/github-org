name: terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: "plan or apply"
        type: choice
        options: [plan, apply]
        default: plan
  pull_request:
    paths: ["**.tf", "**.tfvars", ".github/workflows/terraform.yml"]
  push:
    branches: [main]
    paths: ["**.tf", "**.tfvars"]

permissions:
  contents: write # needed to commit updated state back to the repo
  pull-requests: write

# State lives in the repo and has no lock. Serialize runs so two applies can
# never write state concurrently. Never cancel a run mid-apply.
concurrency:
  group: terraform-state
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GitHub App token for the Terraform provider (Organization
      # administration + members). Does NOT have repo contents:write — the
      # state push below uses the default Actions token persisted by checkout.
      - name: Generate org admin token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TF_APP_ID }}
          private-key: ${{ secrets.TF_APP_PRIVATE_KEY }}
          owner: chloros-nl

      - name: Export token for Terraform
        run: echo "GITHUB_TOKEN=${{ steps.app-token.outputs.token }}" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      - run: terraform init
      - run: terraform fmt -check -recursive
      - run: terraform validate

      - name: Plan
        if: >-
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'plan')
        run: terraform plan -no-color -input=false

      - name: Apply
        id: apply
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
        run: terraform apply -auto-approve -input=false

      - name: Commit state back to repo
        if: steps.apply.conclusion == 'success'
        run: |
          if git diff --quiet -- terraform.tfstate; then
            echo "State unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add terraform.tfstate
          git commit -m "chore(ci): update terraform state [skip ci]"
          git push
